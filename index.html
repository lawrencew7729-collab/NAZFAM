<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAZFAM SDN BHD | Toilet Cubicle System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Caveat:wght@700&family=Gochi+Hand&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        @keyframes slow-zoom {
            from { transform: scale(1.0); }
            to { transform: scale(1.1); }
        }
        .animate-slow-zoom { animation: slow-zoom 20s ease-in-out infinite alternate; }
        
        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-rainbow {
            background: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow-bg 8s ease infinite;
        }

        @keyframes rainbow-text {
            0% { color: #ff0000; }
            14% { color: #ff7f00; }
            28% { color: #ffff00; }
            42% { color: #00ff00; }
            56% { color: #0000ff; }
            70% { color: #4b0082; }
            84% { color: #8b00ff; }
            100% { color: #ff0000; }
        }
        .animate-rainbow-text {
            animation: rainbow-text 3s linear infinite;
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-pulse-soft { animation: pulse-soft 3s ease-in-out infinite; }
        
        .tracking-logo { letter-spacing: 1.48em; }
        .tracking-hero { letter-spacing: 0.32em; }
        .font-signature { font-family: 'Caveat', cursive; }
        .font-kid { font-family: 'Gochi Hand', cursive; }

        @media (max-width: 768px) {
            .tracking-logo { letter-spacing: 0.8em; }
            .tracking-hero { letter-spacing: 0.15em; }
        }
    </style>
</head>
<body class="bg-white text-slate-900 selection:bg-blue-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const WHATSAPP_NUMBER = "60165506664";
        const YOUTUBE_LINK = "https://youtu.be/czshdH6qlXY?si=Jl0K6tym3tFNegUz";
        const PHENOLIC_VIDEO = "https://youtu.be/Z6MK0gvBmLg?si=CRkIPKTEYRvsCABh";
        const MIX_MATCH_LINK = "https://nazfam-cubicle.vercel.app/";
        const HERO_BG = "https://i.imgur.com/MGZ2ROo.jpg";

        const ALU_IMAGES = [
            'https://i.imgur.com/kFZ1tx6.jpeg',
            'https://i.imgur.com/R3Y4yM5.jpeg',
            'https://i.imgur.com/B9UWECE.jpeg',
            'https://i.imgur.com/2GqzPel.jpeg'
        ];

        const PRODUCTS = {
            nilono: {
                id: 'nilono',
                name: 'Nilono',
                tagline: 'The Durable Economic Standard',
                description: 'The Nilono series is engineered for high-frequency public environments where durability meets cost-efficiency. Utilizing high-grade Nylon accessories, it offers exceptional resistance to chemicals and impact.',
                coverImage: 'https://i.imgur.com/Gm3WNdX.jpeg',
                techImage: 'https://i.imgur.com/mXNTH02.jpeg',
                specs: { thickness: '10mm / 12mm', material: 'Phenolic Compact Board', accessories: 'Nylon Series (Black)', footing: 'Nylon Adjustable Foot' }
            },
            stalo: {
                id: 'stalo',
                name: 'Stalo',
                tagline: 'Stainless Steel Strength',
                description: 'Featuring Grade 304 Stainless Steel accessories, the Stalo system provides a premium metallic finish combined with superior structural integrity.',
                coverImage: 'https://i.imgur.com/EChEtFt.jpeg',
                techImage: 'https://i.imgur.com/Ec7bfZd.jpeg',
                specs: { thickness: '10mm / 12mm', material: 'Phenolic Compact Board', accessories: 'Stainless steel alloy', footing: 'Stainless steel alloy adjustable foot' }
            },
            skatalo: {
                id: 'skatalo',
                name: 'Skatalo',
                tagline: 'Balanced Structural Stability',
                description: 'The Skatalo system is a versatile solution designed for medium to high traffic areas, balancing modern design with heavy-duty hardware.',
                coverImage: 'https://i.imgur.com/PCHNPrz.jpeg',
                techImage: 'https://i.imgur.com/OF2vJrj.jpeg',
                specs: { thickness: '10mm / 12mm', material: 'Phenolic Compact Board', accessories: 'Nylon (Black) / Stainless steel alloy', footing: 'Aluminum Shoebox (shoeplate) Black powder coated / Natural anodized' }
            },
            pendato: {
                id: 'pendato',
                name: 'Pendato',
                tagline: 'The Ceiling-Suspended System',
                description: 'The Pendato system is suspended from the ceiling, leaving the floor 100% accessible for effortless cleaning and maximum hygiene.',
                coverImage: 'https://i.imgur.com/92uSpco.jpeg',
                techImage: 'https://i.imgur.com/7UCZ77H.jpeg',
                specs: { thickness: '12mm / 13mm', material: 'Phenolic Compact Board', accessories: 'Overhead Track Hardware', footing: 'None (Ceiling Suspended)' }
            },
            pordo: {
                id: 'pordo',
                name: 'Pordo',
                tagline: 'Optimized Door Access',
                description: 'Specialized for compact layouts, the Pordo system focuses on door efficiency and swing clearance, ideal for limited spaces.',
                coverImage: 'https://i.imgur.com/kaNqga6.jpeg',
                techImage: 'https://i.imgur.com/smretsQ.jpeg',
                specs: { thickness: '10mm / 12mm', material: 'Phenolic Compact Board', accessories: 'Nylon (Black) / Stainless steel alloy', footing: 'No foot. Support by 2 sides aluminum door frame (Black / Natural Anodized)' }
            },
            fronto: {
                id: 'fronto',
                name: 'Fronto',
                tagline: 'Reinforced Frontal Engineering',
                description: 'Fronto utilizes a reinforced front-panel structure to provide unmatched rigidity, recommended for industrial settings.',
                coverImage: 'https://i.imgur.com/JvAr7Rh.jpeg',
                techImage: 'https://i.imgur.com/lmnpdAZ.jpeg',
                specs: { thickness: '10mm / 12mm', material: 'Phenolic Compact Board', accessories: 'Nylon (Black) / Stainless steel alloy', footing: 'No foot. Support by the front pilaster attached by brickwall' }
            }
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedProductId, setSelectedProductId] = useState(null);
            const [scrolled, setScrolled] = useState(false);
            const [formData, setFormData] = useState({ name: '', company: '', contact: '', message: '' });

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage]);

            const navigateToProduct = (id) => {
                setSelectedProductId(id);
                setCurrentPage('product');
                window.scrollTo(0, 0);
            };

            const navigateHome = () => {
                setCurrentPage('home');
                setSelectedProductId(null);
                window.scrollTo(0, 0);
            };

            const handleInquiry = () => {
                const text = `Hi NAZFAM SDN BHD, I have an inquiry:\n\nName: ${formData.name}\nCompany: ${formData.company}\nContact: ${formData.contact}\nRequirements: ${formData.message}`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
            };

            const Logo = ({ isDark }) => (
                <div className="flex flex-col cursor-pointer" onClick={navigateHome}>
                    <div className={`font-black text-2xl md:text-3xl leading-none tracking-tight ${isDark ? 'text-slate-900' : 'text-white'}`}>
                        NAZFAM <span className="text-blue-600 font-bold">SDN BHD</span>
                    </div>
                    <div className={`text-[6px] md:text-[8px] font-black uppercase tracking-logo whitespace-nowrap mt-1 ${isDark ? 'text-blue-600' : 'text-blue-400'}`}>
                        toilet cubicle system
                    </div>
                </div>
            );

            const ProductDetail = () => {
                const product = PRODUCTS[selectedProductId];
                if (!product) return null;

                const waMessage = `Hi NAZFAM SDN BHD, I am interested in the ${product.name} system.\n\nImage Reference: ${product.techImage}`;
                const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waMessage)}`;

                return (
                    <div className="pt-24 md:pt-32 pb-20 animate-in fade-in duration-500 bg-white">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                            <button onClick={navigateHome} className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 mb-8 hover:text-blue-600 transition-colors">
                                <Icon name="arrow-left" size={14} /> Back to Home
                            </button>

                            <div className="mb-12 rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-xl border border-slate-100 bg-slate-50">
                                <img src={product.techImage} alt={product.name} className="w-full h-auto object-contain block mx-auto" />
                            </div>

                            <div className="max-w-3xl mx-auto text-center md:text-left">
                                <h1 className="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter mb-4">{product.name}</h1>
                                <p className="text-lg md:text-xl font-bold text-blue-600 mb-8 uppercase tracking-widest">{product.tagline}</p>
                                <p className="text-lg text-slate-500 leading-relaxed mb-12">{product.description}</p>
                                
                                <div className="bg-slate-50 rounded-[2.5rem] p-8 md:p-12 border border-slate-200 shadow-inner text-left">
                                    <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-8 flex items-center gap-2">
                                        <Icon name="settings" size={16} className="text-blue-600" /> Technical Data Sheet
                                    </h3>
                                    <div className="space-y-6">
                                        {Object.entries(product.specs).map(([key, value]) => (
                                            <div key={key} className="flex flex-col md:flex-row md:justify-between border-b border-slate-200 pb-4 last:border-0 last:pb-0">
                                                <span className="text-[10px] font-black uppercase text-slate-400 mb-1 md:mb-0">{key}</span>
                                                <span className="font-bold text-slate-900 text-base md:text-lg">{value}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <a href={waLink} target="_blank" className="mt-12 w-full flex items-center justify-center gap-3 py-6 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 transition-all uppercase tracking-widest text-sm shadow-xl shadow-blue-200">
                                    Inquiry on WhatsApp <Icon name="message-circle" size={18} />
                                </a>
                            </div>
                        </div>
                    </div>
                );
            };

            const HomeContent = () => (
                <>
                    <section className="relative h-screen bg-slate-950 overflow-hidden flex items-center">
                        <div className="absolute inset-0 z-0">
                            <img src={HERO_BG} className="w-full h-full object-cover opacity-30 animate-slow-zoom" />
                            <div className="absolute inset-0 bg-gradient-to-r from-slate-950 to-transparent"></div>
                        </div>
                        <div className="relative z-10 max-w-7xl mx-auto px-4 w-full pt-20 text-center md:text-left">
                            <div className="flex flex-col items-center md:items-start relative">
                                <div className="flex flex-col md:flex-row items-center gap-6 relative">
                                    <h1 className="text-[16vw] md:text-[11rem] font-black text-white leading-[0.8] tracking-tighter">
                                        NAZFAM
                                    </h1>
                                    
                                    <div className="flex flex-col items-center gap-2 md:mt-10 relative">
                                        <div className="flex gap-4 relative">
                                            {/* Mix & Match Ball */}
                                            <a 
                                                href={MIX_MATCH_LINK} 
                                                target="_blank" 
                                                title="Color Mix & Match"
                                                className="w-20 h-20 md:w-32 md:h-32 rounded-full animate-rainbow shadow-2xl hover:scale-110 transition-transform flex flex-col items-center justify-center p-2 text-white border-4 border-white/40 group relative"
                                            >
                                                <Icon name="palette" size={24} className="md:w-10 md:h-10 mb-1" />
                                                <span className="text-[10px] md:text-xl font-black text-center leading-none uppercase tracking-tighter">Mix &<br/>Match</span>
                                            </a>

                                            {/* What's Phenolic Ball */}
                                            <a 
                                                href={PHENOLIC_VIDEO} 
                                                target="_blank" 
                                                title="What's Phenolic Is?"
                                                className="w-20 h-20 md:w-32 md:h-32 rounded-full bg-slate-900 animate-pulse-soft shadow-2xl hover:scale-110 transition-transform flex flex-col items-center justify-center p-2 text-white border-4 border-blue-600/50 group relative"
                                            >
                                                <Icon name="help-circle" size={24} className="md:w-12 md:h-12 text-blue-500 mb-1" />
                                                <span className="text-[10px] md:text-xl font-black text-center leading-none uppercase tracking-tighter">Phenolic?</span>
                                            </a>

                                            {/* SVG Arrows from "click to play" */}
                                            <svg className="absolute top-16 left-0 w-full h-24 text-blue-400 opacity-60 pointer-events-none hidden md:block" viewBox="0 0 200 100">
                                                {/* Arrow to Left Ball */}
                                                <path d="M100 80 Q 80 80 60 50" fill="transparent" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                                                <path d="M65 55 L60 50 L68 48" fill="transparent" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                                                
                                                {/* Arrow to Right Ball */}
                                                <path d="M100 80 Q 120 80 140 50" fill="transparent" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                                                <path d="M132 48 L140 50 L135 55" fill="transparent" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                                            </svg>
                                        </div>

                                        {/* Kid Handwriting click to play - Flash Rainbow */}
                                        <div className="font-kid text-2xl md:text-4xl animate-rainbow-text opacity-90 select-none mt-2">
                                            click to play
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full">
                                    <span className="text-blue-400 text-[1.4vw] md:text-[1.05rem] font-black tracking-hero uppercase block mt-4 whitespace-nowrap">
                                        toilet cubicle system
                                    </span>
                                </div>
                            </div>
                            <p className="mt-12 text-xl text-slate-400 max-w-xl font-light mx-auto md:mx-0">Architectural excellence in restroom systems. Professional engineering for high-traffic environments.</p>
                            <div className="mt-10">
                                <a href="#systems" className="px-10 py-5 bg-blue-600 text-white font-black rounded-2xl uppercase tracking-widest text-xs hover:bg-blue-500 transition-all">View Systems</a>
                            </div>
                        </div>
                    </section>

                    <section className="py-20 bg-white border-b border-slate-100 text-center">
                        <div className="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-y-12 md:gap-10">
                            {[
                                {v:'5000+', l:'Units installed'}, 
                                {v:'200+', l:'Projects handled'},
                                {v:'15', l:'years of experience'},
                                {v:'10', l:'years of warranty (term & condition)'}
                            ].map((s,i) => (
                                <div key={i} className="px-2">
                                    <div className="text-5xl md:text-7xl font-black text-slate-900">{s.v}</div>
                                    <div className="text-[9px] md:text-xs font-black text-slate-400 uppercase tracking-widest mt-2 px-2 leading-tight">{s.l}</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section id="systems" className="py-32">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-xs font-black text-blue-600 uppercase tracking-[0.5em] mb-4 text-center md:text-left">Our Models</h2>
                            <h3 className="text-5xl md:text-6xl font-black text-slate-900 tracking-tighter mb-20 text-center md:text-left">Cubicle Systems</h3>
                            <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
                                {Object.values(PRODUCTS).map(p => (
                                    <div key={p.id} className="group bg-slate-50 rounded-2xl md:rounded-[3rem] overflow-hidden border border-slate-100 flex flex-col h-full hover:shadow-2xl transition-all duration-500">
                                        <div className="h-40 md:h-64 overflow-hidden">
                                            <img src={p.coverImage} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                                        </div>
                                        <div className="p-4 md:p-10 flex-grow text-center md:text-left">
                                            <h4 className="text-xl md:text-3xl font-black text-slate-900 mb-1 md:mb-2">{p.name}</h4>
                                            <p className="text-[8px] md:text-sm text-slate-500 font-medium uppercase tracking-widest leading-tight">{p.tagline}</p>
                                        </div>
                                        <div className="p-4 md:p-10 pt-0">
                                            <button onClick={() => navigateToProduct(p.id)} className="w-full flex justify-between items-center px-4 md:px-8 py-3 md:py-5 bg-slate-900 text-white rounded-xl md:rounded-2xl font-black text-[8px] md:text-[10px] uppercase tracking-widest group-hover:bg-blue-600 transition-colors">
                                                <span className="hidden md:inline">Technical Specs</span>
                                                <span className="md:hidden">Specs</span>
                                                <Icon name="chevron-right" size={14} className="md:w-4 md:h-4" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="alu" className="py-20 md:py-32 bg-slate-50 text-center md:text-left">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="bg-slate-950 rounded-[2.5rem] md:rounded-[4rem] p-8 md:p-24 relative overflow-hidden">
                                <div className="relative z-10 grid lg:grid-cols-2 gap-10 md:gap-20 items-center">
                                    <div className="order-1 relative flex flex-col items-center md:items-start">
                                        <div className="absolute -top-12 md:-top-16 left-1/2 -translate-x-1/2 transform -rotate-2 font-signature text-blue-400 text-3xl md:text-5xl opacity-90 select-none whitespace-nowrap z-20">
                                            Signature Grade — Premium Investment
                                        </div>
                                        
                                        <span className="text-blue-400 font-black tracking-widest text-[10px] uppercase mt-4 md:mt-0">Special Innovation</span>
                                        <h2 className="text-5xl md:text-8xl font-black text-white italic tracking-tighter leading-none my-6 md:my-8 text-center md:text-left">THE ALU<br/>CONCEPT</h2>
                                        <p className="text-lg md:text-xl text-slate-400 font-light leading-relaxed mb-8">Full-aluminum alloy core designed for zero-failure in extreme moisture environments.</p>
                                    </div>
                                    <div className="order-2 flex flex-col items-center">
                                        <div className="grid grid-cols-2 gap-3 md:gap-4 w-full">
                                            {ALU_IMAGES.map((img, i) => (
                                                <div key={i} className="aspect-video rounded-xl md:rounded-2xl overflow-hidden border border-white/10 group shadow-2xl">
                                                    <img src={img} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" />
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="mt-8">
                                            <a 
                                                href={YOUTUBE_LINK}
                                                target="_blank"
                                                className="flex items-center gap-3 px-10 py-4 bg-red-600 text-white rounded-full font-black text-[10px] md:text-xs uppercase tracking-widest hover:bg-red-700 transition-all shadow-xl hover:scale-105 active:scale-95"
                                            >
                                                <Icon name="youtube" size={20} /> Watch Product Demo
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="contact" className="py-32">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="bg-white rounded-[2.5rem] md:rounded-[4rem] shadow-2xl border border-slate-100 overflow-hidden grid lg:grid-cols-5">
                                <div className="lg:col-span-2 bg-slate-950 p-12 md:p-24 text-white flex flex-col justify-center text-center md:text-left">
                                    <h2 className="text-4xl md:text-5xl font-black leading-tight mb-4">Get in touch<br/>with us.</h2>
                                </div>
                                <div className="lg:col-span-3 p-12 md:p-24">
                                    <div className="space-y-8">
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <input 
                                                value={formData.name} 
                                                onChange={e => setFormData({...formData, name: e.target.value})}
                                                placeholder="Full Name" 
                                                className="w-full p-6 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600" 
                                            />
                                            <input 
                                                value={formData.company} 
                                                onChange={e => setFormData({...formData, company: e.target.value})}
                                                placeholder="Company Name" 
                                                className="w-full p-6 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600" 
                                            />
                                        </div>
                                        <input 
                                            value={formData.contact} 
                                            onChange={e => setFormData({...formData, contact: e.target.value})}
                                            placeholder="Email / Phone" 
                                            className="w-full p-6 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600" 
                                        />
                                        <textarea 
                                            value={formData.message} 
                                            onChange={e => setFormData({...formData, message: e.target.value})}
                                            placeholder="Project Requirements" 
                                            rows="4" 
                                            className="w-full p-6 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600"
                                        ></textarea>
                                        <button 
                                            onClick={handleInquiry}
                                            className="w-full py-6 bg-blue-600 text-white font-black rounded-2xl uppercase tracking-widest text-sm shadow-xl shadow-blue-100 hover:bg-blue-700 transition-colors"
                                        >
                                            Send Inquiry to WhatsApp
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </>
            );

            return (
                <div className="min-h-screen">
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled || currentPage === 'product' ? 'bg-white shadow-xl py-3' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            <Logo isDark={scrolled || currentPage === 'product'} />
                            <div className={`hidden md:flex items-center gap-10 text-[10px] font-black uppercase tracking-widest ${scrolled || currentPage === 'product' ? 'text-slate-600' : 'text-white/80'}`}>
                                <button onClick={navigateHome} className="hover:text-blue-600 transition-colors">Home</button>
                                <a href="#systems" onClick={() => currentPage !== 'home' && navigateHome()} className="hover:text-blue-600 transition-colors">Systems</a>
                                <a href="#alu" onClick={() => currentPage !== 'home' && navigateHome()} className="hover:text-blue-600 transition-colors">The Alu</a>
                                <a href="#contact" className="px-8 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">Contact Us</a>
                            </div>
                        </div>
                    </nav>

                    <main>
                        {currentPage === 'home' ? <HomeContent /> : <ProductDetail />}
                    </main>

                    <footer className="py-20 border-t border-slate-100">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
